r": "white"}, "id": "Jerome Cornfield", "label": "Jerome Cornfield", "shape": "dot", "size": 10, "source_id": "chunk-2a698820f9767612065e4d08199917ba"}, {"color": "#97c2fc", "created_at": 1776188625, "description": "The National Heart Institute is the organization where Jerome Cornfield was affiliated for the study.", "entity_id": "National Heart Institute", "entity_type": "organization", "file_path": "unknown_source", "font": {"color": "white"}, "id": "National Heart Institute", "label": "National Heart Institute", "shape": "dot", "size": 10, "source_id": "chunk-2a698820f9767612065e4d08199917ba"}, {"color": "#97c2fc", "created_at": 1776188626, "description": "The Federation of American Societies for Experimental Biology is the organization associated with the publication details of the study.", "entity_id": "Federation of American Societies for Experimental Biology", "entity_type": "organization", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Federation of American Societies for Experimental Biology", "label": "Federation of American Societies for Experimental Biology", "shape": "dot", "size": 10, "source_id": "chunk-2a698820f9767612065e4d08199917ba"}, {"color": "#97c2fc", "created_at": 1776188625, "description": "Discriminant Function Analysis is a mathematical method used to summarize observations and model the joint dependence of CHD risk on cholesterol and blood pressure.", "entity_id": "Discriminant Function Analysis", "entity_type": "method", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Discriminant Function Analysis", "label": "Discriminant Function Analysis", "shape": "dot", "size": 10, "source_id": "chunk-2a698820f9767612065e4d08199917ba"}, {"color": "#97c2fc", "created_at": 1776188625, "description": "Framingham, Massachusetts is the location where the long-term follow-up study of heart disease was conducted.", "entity_id": "Framingham, Massachusetts", "entity_type": "location", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Framingham, Massachusetts", "label": "Framingham, Massachusetts", "shape": "dot", "size": 10, "source_id": "chunk-2a698820f9767612065e4d08199917ba"}, {"color": "#97c2fc", "created_at": 1776190057, "description": "Myocardial infarction is a clinically manifest form of coronary heart disease developed in the study sample.\u003cSEP\u003eMyocardial infarction is a significant medical event requiring long-term treatment with aspirin and beta-adrenergic blockers.", "entity_id": "Myocardial Infarction", "entity_type": "concept", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Myocardial Infarction", "label": "Myocardial Infarction", "shape": "dot", "size": 10, "source_id": "chunk-2a698820f9767612065e4d08199917ba\u003cSEP\u003echunk-a512cd818fc7fc052ba42676e3dbd8a6"}, {"color": "#97c2fc", "created_at": 1776190050, "description": "Angina pectoris is a clinically manifest form of coronary heart disease developed in the study sample.\u003cSEP\u003eA chest pain condition that can be effectively treated by calcium antagonists, primarily by relieving vasospastic angina.\u003cSEP\u003eAngina pectoris is mentioned as the most common initial manifestation of chronic ischaemic heart disease.\u003cSEP\u003eAngina Pectoris is a symptom whose threshold is assessed and which can be managed by therapy to improve quality of life.", "entity_id": "Angina Pectoris", "entity_type": "concept", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Angina Pectoris", "label": "Angina Pectoris", "shape": "dot", "size": 10, "source_id": "chunk-2a698820f9767612065e4d08199917ba\u003cSEP\u003echunk-5d706ae189b3bf78b45c9dc1e1b73ebf\u003cSEP\u003echunk-0a8a07023292447dd472b098aca92a15\u003cSEP\u003echunk-725fd25b2b914218473f4027eb936a0b"}, {"color": "#97c2fc", "created_at": 1776188626, "description": "Federation Proceedings is the source publication where the paper was presented in July-August 1962.", "entity_id": "Federation Proceedings", "entity_type": "event", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Federation Proceedings", "label": "Federation Proceedings", "shape": "dot", "size": 10, "source_id": "chunk-2a698820f9767612065e4d08199917ba"}, {"color": "#97c2fc", "created_at": 1776190136, "description": "Type 1 diabetes is a condition associated with a marked increase of CHD, with risk becoming evident after the age of 30.", "entity_id": "Type 1 Diabetes", "entity_type": "concept", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Type 1 Diabetes", "label": "Type 1 Diabetes", "shape": "dot", "size": 10, "source_id": "chunk-1402c215c7fd318145880a62d19e2b3a"}, {"color": "#97c2fc", "created_at": 1776190136, "description": "Central obesity is the accumulation of fat to the trunk and abdominal cavity and is associated with high prevalence of lipid abnormalities and hypertension.", "entity_id": "Central Obesity", "entity_type": "concept", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Central Obesity", "label": "Central Obesity", "shape": "dot", "size": 10, "source_id": "chunk-1402c215c7fd318145880a62d19e2b3a"}, {"color": "#97c2fc", "created_at": 1776190133, "description": "Smoking is listed as a cardiac risk factor that must be controlled during secondary prevention of ACS.\u003cSEP\u003eSmoking is a health hazard responsible for a significant portion of all avoidable deaths, particularly cardiovascular death.\u003cSEP\u003eSmoking is identified as a risk factor for CVD, necessitating complete cessation.", "entity_id": "Smoking", "entity_type": "concept", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Smoking", "label": "Smoking", "shape": "dot", "size": 10, "source_id": "chunk-e6bcb6c446cca77c7de2fbf5c07b59b0\u003cSEP\u003echunk-1402c215c7fd318145880a62d19e2b3a\u003cSEP\u003echunk-fba062a869c808ddf245e61a4921a0b9"}, {"color": "#97c2fc", "created_at": 1776190139, "description": "A risk factor describes characteristics found in healthy individuals that are independently related to the subsequent occurrence of coronary heart disease.", "entity_id": "Risk Factor", "entity_type": "concept", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Risk Factor", "label": "Risk Factor", "shape": "dot", "size": 10, "source_id": "chunk-8c2d4bf173facbfeaa65d8b86b3d62ca"}, {"color": "#97c2fc", "created_at": 1776190139, "description": "Screening for coronary artery disease is a technique that must be easy, precise, cost-effective, and acceptable to the community.", "entity_id": "Screening", "entity_type": "method", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Screening", "label": "Screening", "shape": "dot", "size": 10, "source_id": "chunk-8c2d4bf173facbfeaa65d8b86b3d62ca"}, {"color": "#97c2fc", "created_at": 1776190139, "description": "Lifestyle modification can retard the development of coronary heart disease, both before and after a clinical event.", "entity_id": "Lifestyle Modification", "entity_type": "concept", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Lifestyle Modification", "label": "Lifestyle Modification", "shape": "dot", "size": 10, "source_id": "chunk-8c2d4bf173facbfeaa65d8b86b3d62ca"}, {"color": "#97c2fc", "created_at": 1776190134, "description": "The Mediterranean diet is characterized by being low in saturated fat and high in unsaturated fat, and is associated with good life expectancy.\u003cSEP\u003eThe Mediterranean Diet is associated with the best life expectancy, characterized by low saturated fat and high unsaturated fat, especially monounsaturated fat.", "entity_id": "Mediterranean Diet", "entity_type": "concept", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Mediterranean Diet", "label": "Mediterranean Diet", "shape": "dot", "size": 10, "source_id": "chunk-1402c215c7fd318145880a62d19e2b3a\u003cSEP\u003echunk-8c2d4bf173facbfeaa65d8b86b3d62ca"}, {"color": "#97c2fc", "created_at": 1776190134, "description": "The Japanese diet is characterized by being low in saturated fat and high in complex carbohydrates, and is associated with good life expectancy.\u003cSEP\u003eThe Japanese Diet is associated with the best life expectancy, characterized by low saturated fat and high complex carbohydrates.", "entity_id": "Japanese Diet", "entity_type": "concept", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Japanese Diet", "label": "Japanese Diet", "shape": "dot", "size": 10, "source_id": "chunk-1402c215c7fd318145880a62d19e2b3a\u003cSEP\u003echunk-8c2d4bf173facbfeaa65d8b86b3d62ca"}, {"color": "#97c2fc", "created_at": 1776190053, "description": "The international body responsible for health standards, featured on the document source citation.\u003cSEP\u003eThe World Health Organisation is an organization listed in the context header related to medical care standards.\u003cSEP\u003eThe World Health Organisation is listed as a source for health information regarding coronary artery disease prevention.\u003cSEP\u003eThe World Health Organisation is an organization that recommends the Body Mass Index for assessing the degree of obesity.", "entity_id": "World Health Organisation", "entity_type": "organization", "file_path": "unknown_source", "font": {"color": "white"}, "id": "World Health Organisation", "label": "World Health Organisation", "shape": "dot", "size": 10, "source_id": "chunk-5d706ae189b3bf78b45c9dc1e1b73ebf\u003cSEP\u003echunk-41d9481df9dca8a996f49a342af0df96\u003cSEP\u003echunk-1402c215c7fd318145880a62d19e2b3a\u003cSEP\u003echunk-8c2d4bf173facbfeaa65d8b86b3d62ca"}, {"color": "#97c2fc", "created_at": 1776190059, "description": "A governmental/health body listed in the context header regarding medical services and standards.\u003cSEP\u003eThis organization is listed as a source for health information regarding coronary artery disease prevention.", "entity_id": "Ministry Of Health And Quality Of Life/Mauritius Institute Of Health", "entity_type": "organization", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Ministry Of Health And Quality Of Life/Mauritius Institute Of Health", "label": "Ministry Of Health And Quality Of Life/Mauritius Institute Of Health", "shape": "dot", "size": 10, "source_id": "chunk-41d9481df9dca8a996f49a342af0df96\u003cSEP\u003echunk-8c2d4bf173facbfeaa65d8b86b3d62ca"}, {"color": "#97c2fc", "created_at": 1776190050, "description": "A class of drugs used to treat hypertension and angina pectoris, which decreases coronary vascular resistance and increases coronary blood flow.\u003cSEP\u003eCalcium antagonists are a class of drugs that effectively treat hypertension and angina pectoris by decreasing coronary vascular resistance.\u003cSEP\u003eCalcium antagonists, including verapamil and diltiazem, are medications used for cardiac treatment, especially if beta-blockers are contraindicated.\u003cSEP\u003eCalcium antagonists may be selectively prescribed in patients with specific indications such as hypertension or angina.", "entity_id": "Calcium Antagonists", "entity_type": "concept", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Calcium Antagonists", "label": "Calcium Antagonists", "shape": "dot", "size": 10, "source_id": "chunk-5d706ae189b3bf78b45c9dc1e1b73ebf\u003cSEP\u003echunk-a512cd818fc7fc052ba42676e3dbd8a6\u003cSEP\u003echunk-ba47882bd330c094f4cf8a1a605cf0b0\u003cSEP\u003echunk-0a8a07023292447dd472b098aca92a15"}, {"color": "#97c2fc", "created_at": 1776190147, "description": "Beta-blockers are a class of drugs used to decrease heart rate, contractility, and arterial pressure for treating angina and hypertension.", "entity_id": "Beta-Blockers", "entity_type": "content", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Beta-Blockers", "label": "Beta-Blockers", "shape": "dot", "size": 10, "source_id": "chunk-0a8a07023292447dd472b098aca92a15"}, {"color": "#97c2fc", "created_at": 1776190147, "description": "This is the primary condition requiring multifactorial intervention, regular follow-up, and medical management.\u003cSEP\u003eChronic Ischaemic Heart Disease is the underlying condition treated by the discussed medical therapies, aiming to prevent MI and death.", "entity_id": "Chronic Ischaemic Heart Disease", "entity_type": "concept", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Chronic Ischaemic Heart Disease", "label": "Chronic Ischaemic Heart Disease", "shape": "dot", "size": 10, "source_id": "chunk-0a8a07023292447dd472b098aca92a15\u003cSEP\u003echunk-725fd25b2b914218473f4027eb936a0b"}, {"color": "#97c2fc", "created_at": 1776190050, "description": "A chronic condition characterized by high blood pressure and listed as a modifiable risk factor for cardiovascular disease.\u003cSEP\u003eHypertension is a major cardiovascular risk factor, a contraindication, and a condition treated by certain medications.\u003cSEP\u003eHypertension is defined by a blood pressure exceeding 170/100 mmHg, indicating a high-risk condition for severe ACS.\u003cSEP\u003eHypertension is a health condition with recorded prevalence rates in adults aged 25 and above.\u003cSEP\u003eHypertension is a risk factor associated with central obesity, potentially leading to increased coronary artery disease.\u003cSEP\u003eHypertension (HBP) is a risk factor requiring blood pressure control goals (\u2264 140/90 mmHg).\u003cSEP\u003eHypertension is a specific indication that might warrant the selective prescription of calcium antagonists.", "entity_id": "Hypertension", "entity_type": "concept", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Hypertension", "label": "Hypertension", "shape": "dot", "size": 10, "source_id": "chunk-5d706ae189b3bf78b45c9dc1e1b73ebf\u003cSEP\u003echunk-a512cd818fc7fc052ba42676e3dbd8a6\u003cSEP\u003echunk-e6bcb6c446cca77c7de2fbf5c07b59b0\u003cSEP\u003echunk-1402c215c7fd318145880a62d19e2b3a\u003cSEP\u003echunk-8c2d4bf173facbfeaa65d8b86b3d62ca\u003cSEP\u003echunk-0a8a07023292447dd472b098aca92a15\u003cSEP\u003echunk-fba062a869c808ddf245e61a4921a0b9"}, {"color": "#97c2fc", "created_at": 1776190050, "description": "A serious disease state whose risk factors, such as smoking and hyperlipidemia, are modifiable and affect clinical outcome.", "entity_id": "Coronary Artery Disease (CAD)", "entity_type": "concept", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Coronary Artery Disease (CAD)", "label": "Coronary Artery Disease (CAD)", "shape": "dot", "size": 10, "source_id": "chunk-5d706ae189b3bf78b45c9dc1e1b73ebf"}, {"color": "#97c2fc", "created_at": 1776190070, "description": "This organization is the source of the medical guidelines and clinical protocols regarding ACS management.", "entity_id": "Ministry of Health And Quality Of Life/Mauritius Institute Of Health/World Health Organisation", "entity_type": "organization", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Ministry of Health And Quality Of Life/Mauritius Institute Of Health/World Health Organisation", "label": "Ministry of Health And Quality Of Life/Mauritius Institute Of Health/World Health Organisation", "shape": "dot", "size": 10, "source_id": "chunk-e6bcb6c446cca77c7de2fbf5c07b59b0"}, {"color": "#97c2fc", "created_at": 1776190148, "description": "Blood Pressure Control involves lifestyle modification and individualized antihypertensive drug use to maintain a blood pressure below 140/90 mmHg.", "entity_id": "Blood Pressure Control", "entity_type": "method", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Blood Pressure Control", "label": "Blood Pressure Control", "shape": "dot", "size": 10, "source_id": "chunk-fba062a869c808ddf245e61a4921a0b9"}, {"color": "#97c2fc", "created_at": 1776190050, "description": "A common condition associated with an increased risk for CAD and mortality, contributing to other coronary risk factors.\u003cSEP\u003eObesity is a condition that can be assessed by measures such as Body Mass Index, Waist Hip ication, and initial management of patients.\u003cSEP\u003eA medical doctor who may co-manage patients with a cardiologist.\u003cSEP\u003eThe primary care physician is responsible for regularly checking for risk factors such as smoking and elevated lipid levels.", "entity_id": "Primary Care Physician", "entity_type": "person", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Primary Care Physician", "label": "Primary Care Physician", "shape": "dot", "size": 10, "source_id": "chunk-a512cd818fc7fc052ba42676e3dbd8a6\u003cSEP\u003echunk-41d9481df9dca8a996f49a342af0df96\u003cSEP\u003echunk-725fd25b2b914218473f4027eb936a0b"}, {"color": "#97c2fc", "created_at": 1776190059, "description": "A cardiologist is a specialist who evaluates patients, especially those with worsening symptoms, for advanced cardiac interventions.\u003cSEP\u003eA medical specialist to whom patients with certain symptoms or syndromes should be referred.", "entity_id": "Cardiologist", "entity_type": "person", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Cardiologist", "label": "Cardiologist", "shape": "dot", "size": 10, "source_id": "chunk-41d9481df9dca8a996f49a342af0df96\u003cSEP\u003echunk-725fd25b2b914218473f4027eb936a0b"}, {"color": "#97c2fc", "created_at": 1776190059, "description": "ACS is a group of conditions that share a common pathophysiology involving the rupture of a vulnerable plaque.\u003cSEP\u003eAcute Coronary Syndrome is the main medical condition discussed, requiring intensive monitoring and specific therapeutic interventions.\u003cSEP\u003eA medical condition that requires immediate referral to a cardiologist.", "entity_id": "Acute Coronary Syndrome", "entity_type": "concept", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Acute Coronary Syndrome", "label": "Acute Coronary Syndrome", "shape": "dot", "size": 10, "source_id": "chunk-41d9481df9dca8a996f49a342af0df96\u003cSEP\u003echunk-e6bcb6c446cca77c7de2fbf5c07b59b0\u003cSEP\u003 umulation of fluid in the lungs, which is a cause of dyspnea.", "entity_id": "Pulmonary Congestion", "entity_type": "concept", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Pulmonary Congestion", "label": "Pulmonary Congestion", "shape": "dot", "size": 10, "source_id": "chunk-41d9481df9dca8a996f49a342af0df96\u003cSEP\u003echunk-3bade9898b872aa7e3336771b6b88e1d"}, {"color": "#97c2fc", "created_at": 1776190060, "description": "Acute Myocardial Infarction, the diagnosis of which is characterized by changes in ECG waves.", "entity_id": "Acute MI", "entity_type": "concept", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Acute MI", "label": "Acute MI", "shape": "dot", "size": 10, "source_id": "chunk-41d9481df9dca8a996f49a342af0df96"}, {"color": "#97c2fc", "created_at": 1776190060, "description": "The medical tracing that serves as the hallmark diagnosis for Acute MI due to characteristic wave changes.", "entity_id": "Electrocardiogram", "entity_type": "artifact", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Electrocardiogram", "label": "Electrocardiogram", "shape": "dot", "size": 10, "source_id": "chunk-41d9481df9dca8a996f49a342af0df96"}, {"color": "#97c2fc", "created_at": 1776190061, "description": "The primary treatment goal for patients with Acute MI, aiming to reduce irreversible myocardial damage.", "entity_id": "Reperfusion Therapy", "entity_type": "method", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Reperfusion Therapy", "label": "Reperfusion Therapy", "shape": "dot", "size": 10, "source_id": "chunk-41d9481df9dca8a996f49a342af0df96"}, {"color": "#97c2fc", "created_at": 1776190061, "description": "A type of therapy to be initiated early in the treatment of Acute MI.", "entity_id": "Fibrinolytic Therapy", "entity_type": "method", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Fibrinolytic Therapy", "label": "Fibrinolytic Therapy", "shape": "dot", "size": 10, "source_ , "id": "Unstable Angina", "label": "Unstable Angina", "shape": "dot", "size": 10, "source_id": "chunk-66cab5fae30b68ce441cbeaea72167d4\u003cSEP\u003echunk-ba47882bd330c094f4cf8a1a605cf0b0"}, {"color": "#97c2fc", "created_at": 1776190063, "description": "A set of acute events sharing a common pathophysiology involving the rupture of plaque and subsequent thrombotic cascades.", "entity_id": "Acute Coronary Syndromes", "entity_type": "condition", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Acute Coronary Syndromes", "label": "Acute Coronary Syndromes", "shape": "dot", "size": 10, "source_id": "chunk-66cab5fae30b68ce441cbeaea72167d4"}, {"color": "#97c2fc", "created_at": 1776190064, "description": "A lipid-rich intracoronary deposit that, upon rupture, initiates the chain of events leading to acute coronary syndromes.", "entity_id": "Atherosclerotic Plaque", "entity_type": "artifact", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Atherosclerotic Plaque", "label": "Atherosclerotic Plaque", "shape": "dot", "size": 10, "source_id": "chunk-66cab5fae30b68ce441cbeaea72167d4"}, {"color": "#97c2fc", "created_at": 1776190064, "description": "Transmural myocardial injury occurring if the vessel lumen is completely occluded or inadequate collateralisation is present.", "entity_id": "Infarcation", "entity_type": "condition", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Infarcation", "label": "Infarcation", "shape": "dot", "size": 10, "source_id": "chunk-66cab5fae30b68ce441cbeaea72167d4"}, {"color": "#97c2fc", "created_at": 1776190064, "description": "A formed structure, usually occluding, that results from platelet aggregation and the inflammatory cascade following plaque rupture.", "entity_id": "Thrombus", "entity_type": "concept", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Thrombus", "label": "Thrombus", "shape": "dot", "size": 10, "source_id": "chunk-66cab5fae30b68ce441cbeaea72167d4"}, {"color": "#97c2fc", "created_at": 1776190139, "description": "Non ST elevation acute coronary syndrome is defined by changes in a patient\u0027s angina status and includes presentations like new-onset angina and increasing severity of angina.", "entity_id": "Non St Elevation Acute Coronary Syndrome", "entity_type": "concept", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Non St Elevation Acute Coronary Syndrome", "label": "Non St Elevation Acute Coronary Syndrome", "shape": "dot", "size": 10, "source_id": "chunk-ba47882bd330c094f4cf8a1a605cf0b0"}, {"color": "#97c2fc", "created_at": 1776190148, "description": "NCD is the focus area of the guidelines, requiring primary and secondary prevention.", "entity_id": "Non-Communicable Disease", "entity_type": "concept", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Non-Communicable Disease", "label": "Non-Communicable Disease", "shape": "dot", "size": 10, "source_id": "chunk-fba062a869c808ddf245e61a4921a0b9"}, {"color": "#97c2fc", "created_at": 1776190066, "description": "AMI is a cardiac event that can be indicated by ST segment elevation and requires various interventions.", "entity_id": "Acute Myocardial Infarction", "entity_type": "concept", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Acute Myocardial Infarction", "label": "Acute Myocardial Infarction", "shape": "dot", "size": 10, "source_id": "chunk-3bade9898b872aa7e3336771b6b88e1d"}, {"color": "#97c2fc", "created_at": 1776190066, "description": "Elevation of the ST segment exceeding 1.0 mV in two continuous ECG leads is indicative of AMI.", "entity_id": "ST Segment Elevation", "entity_type": "concept", "file_path": "unknown_source", "font": {"color": "white"}, "id": "ST Segment Elevation", "label": "ST Segment Elevation", "shape": "dot", "size": 10, "source_id": "chunk-3bade9898b872aa7e3336771b6b88e1d"}, {"color": "#97c2fc", "created_at": 1776190067, "description": "A treatment process used for cardiac events, which ": "Type 2 Diabetes", "shape": "dot", "size": 10, "source_id": "chunk-1402c215c7fd318145880a62d19e2b3a"}, {"color": "#97c2fc", "created_at": 1776190137, "description": "Impaired glucose tolerance is a health condition with recorded prevalence rates in adults aged 25 and above.\u003cSEP\u003eIGT is a condition associated with a cardiovascular risk pattern characteristic of type 2 diabetes.", "entity_id": "Impaired Glucose Tolerance", "entity_type": "concept", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Impaired Glucose Tolerance", "label": "Impaired Glucose Tolerance", "shape": "dot", "size": 10, "source_id": "chunk-1402c215c7fd318145880a62d19e2b3a\u003cSEP\u003echunk-8c2d4bf173facbfeaa65d8b86b3d62ca"}, {"color": "#97c2fc", "created_at": 1776190141, "description": "ECG analysis is a cornerstone diagnostic testing method essential for risk stratification in acute coronary syndromes.", "entity_id": "ECG Analysis", "entity_type": "method", "file_path": "unknown_source", "font": {"color": "white"}, "id": "ECG Analysis", "label": "ECG Analysis", "shape": "dot", "size": 10, "source_id": "chunk-ba47882bd330c094f4cf8a1a605cf0b0"}, {"color": "#97c2fc", "created_at": 1776190141, "description": "This concept includes conditions such as costochondritis, pneumonia, pericarditis, aortic dissection, and upper gastrointestinal disease, which can mimic ACS pain.", "entity_id": "Non-Ischaemic Causes Of Pain", "entity_type": "concept", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Non-Ischaemic Causes Of Pain", "label": "Non-Ischaemic Causes Of Pain", "shape": "dot", "size": 10, "source_id": "chunk-ba47882bd330c094f4cf8a1a605cf0b0"}, {"color": "#97c2fc", "created_at": 1776190140, "description": "CBC is a useful diagnostic test used to evaluate other causes of symptoms and concurrent medical conditions.", "entity_id": "Complete Blood Count", "entity_type": "data", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Complete Blood Count", "label": "Complete Blood Count", "shape": "dot", "size": 10, "source_id": "chunk-ba47882bd330c094f4cf8a1a605cf0b0"}, {"color": "#97c2fc", "created_at": 1776190140, "description": "Renal function tests are useful for diagnosing other causes of symptoms and evaluating for renal insufficiency.", "entity_id": "Renal Function Tests", "entity_type": "data", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Renal Function Tests", "label": "Renal Function Tests", "shape": "dot", "size": 10, "source_id": "chunk-ba47882bd330c094f4cf8a1a605cf0b0"}, {"color": "#97c2fc", "created_at": 1776190145, "description": "Behavioural change is the central focus, suggesting that individuals are not equally ready to modify their behavior.", "entity_id": "Behavioural Change", "entity_type": "concept", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Behavioural Change", "label": "Behavioural Change", "shape": "dot", "size": 10, "source_id": "chunk-4a07b3f1da8427b5b209e9546fe4fc9d"}, {"color": "#97c2fc", "created_at": 1776190145, "description": "The Stages of Change Model is a theory proposing that behavioral modification requires assessing an individual\u0027s readiness to change.", "entity_id": "Stages Of Change Model", "entity_type": "concept", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Stages Of Change Model", "label": "Stages Of Change Model", "shape": "dot", "size": 10, "source_id": "chunk-4a07b3f1da8427b5b209e9546fe4fc9d"}, {"color": "#97c2fc", "created_at": 1776190146, "description": "Pre-contemplation is the initial stage where individuals do not intend to change their high-risk behavior in the foreseeable future.", "entity_id": "Pre-Contemplation", "entity_type": "concept", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Pre-Contemplation", "label": "Pre-Contemplation", "shape": "dot", "size": 10, "source_id": "chunk-4a07b3f1da8427b5b209e9546fe4fc9d"}, {"color": "#97c2fc", "created_at": 1776190146, "description": "Contemplation is the stage where people seriously intend to change their behavior but often stay in this stage for extended periods due to ambivalence.", "entity_id": "Contemplation", "entity_type": "concept", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Contemplation", "label": "Contemplation", "shape": "dot", "size": 10, "source_id": "chunk-4a07b3f1da8427b5b209e9546fe4fc9d"}, {"color": "#97c2fc", "created_at": 1776190145, "description": "Procjaska is a theorist who, along with Diclemente, proposed the Stages of Change Model.", "entity_id": "Procjaska", "entity_type": "person", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Procjaska", "label": "Procjaska", "shape": "dot", "size": 10, "source_id": "chunk-4a07b3f1da8427b5b209e9546fe4fc9d"}, {"color": "#97c2fc", "created_at": 1776190145, "description": "Diclemente is a theorist who, along with Procjaska, proposed the Stages of Change Model.", "entity_id": "Diclemente", "entity_type": "person", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Diclemente", "label": "Diclemente", "shape": "dot", "size": 10, "source_id": "chunk-4a07b3f1da8427b5b209e9546fe4fc9d"}, {"color": "#97c2fc", "created_at": 1776190228, "description": "Medical therapy combined with aggressive cardiovascular risk factor modification is the cornerstone of IHD treatment.", "entity_id": "Medical Therapy", "entity_type": "UNKNOWN", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Medical Therapy", "label": "Medical Therapy", "shape": "dot", "size": 10, "source_id": "chunk-0a8a07023292447dd472b098aca92a15"}, {"color": "#97c2fc", "created_at": 1776190211, "description": "Exercise is a recommended component of a regular program for patients with chronic ischaemic heart disease.", "entity_id": "Exercise", "entity_type": "method", "file_path": "unknown_source", "font": {"color": "white"}, "id": "Exercise", "label": "Exercise", "shape": "dot", "size": 10, "source_id": "chunk
